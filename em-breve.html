<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Em desenvolvimento</title>

    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #181818;
            font-family: Arial, sans-serif;
            color: #ffffff;
            text-align: center;
        }

        .box{
            padding: 30px;
        }

        h1{
            font-size: 28px;
            margin-bottom: 10px;
        }

        p{
            color: #bbb;
            margin-bottom: 25px;
        }

        a{
            text-decoration: none;
            color: #fff;
            background-color: #1e96fc;
            padding: 10px 20px;
            border-radius: 4px;
            transition: 0.3s;
        }

        a:hover{
            transform: scale(1.05);
        }

        .linha{
            width: 60px;
            height: 3px;
            background-color: #1e96fc;
            margin: 15px auto;
            border-radius: 2px;
        }
    </style>
</head>

<body>
    <div class="box">

        <h1>Login em construção 🚧</h1>

        <div class="linha"></div>

        <p>
            Estou desenvolvendo essa tela de login com HTML e CSS.
            Em breve ela estará disponível aqui no portfólio.
        </p>

        <a href="index.html">Voltar</a>

    </div>
</body>
</html>
